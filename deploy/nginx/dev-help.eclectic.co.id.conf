# =============================================================================
# Nginx vhost — JARVIES (dev-help.eclectic.co.id)
# Letakkan di: /etc/nginx/sites-available/dev-help.eclectic.co.id
# Aktifkan   : ln -s /etc/nginx/sites-available/dev-help.eclectic.co.id \
#                    /etc/nginx/sites-enabled/
#
# ALUR:
#   1. Mulai dengan blok HTTP (port 80) di bawah ini saja.
#   2. Jalankan: sudo certbot --nginx -d dev-help.eclectic.co.id
#      -> Certbot otomatis menambahkan blok 443 (SSL) + redirect 80->443.
#   3. Konfigurasi final akan terlihat seperti contoh "SETELAH CERTBOT" di bawah.
# =============================================================================

# ---------- SEBELUM CERTBOT (HTTP saja) -------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name dev-help.eclectic.co.id;

    # Root WAJIB menunjuk ke folder public/ Laravel
    root /var/www/jarvies/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # Sesuaikan versi PHP-FPM (mis. php8.3-fpm)
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

